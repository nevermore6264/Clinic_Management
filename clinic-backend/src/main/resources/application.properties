server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/clinic_management?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
app.chat.upload-dir=uploads/chat

app.jwt.secret=YourSecretKeyForClinicManagementJWTTokenGenerationMustBeLongEnough
app.jwt.expiration-ms=86400000
    
app.frontend-url=http://localhost:4009

# PayOS — không commit secret; dùng biến môi trường APP_PAYOS_* (hoặc điền local)
app.payos.client-id=${APP_PAYOS_CLIENT_ID:}
app.payos.api-key=${APP_PAYOS_API_KEY:}
app.payos.checksum-key=${APP_PAYOS_CHECKSUM_KEY:}
# app.payos.frontend-base-url=http://localhost:4009

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
